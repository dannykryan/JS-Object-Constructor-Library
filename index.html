<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="styles.css">
  <script src="./script.js" defer></script>
  <title>Object Constructor Library</title>
</head>
<body>
  <main>
    <h1>Object Constructor Library</h1>
    <form id="addBookForm">
      <h2> Add a Book</h2>
      <div class="form-group">
        <label for="title">Title:</label>
        <input type="text" id="title" name="title">
      </div>
      <div class="form-group">
        <label for="author">Author:</label>
        <input type="text" id="author" name="author">
      </div>
      <div class="form-group">
        <label for="pages">Pages:</label>
        <input type="number" id="pages" name="pages">
      </div>
      <div class="form-group">
        <label for="coverUrl">Cover URL:</label>
        <input type="text" id="coverUrl" name="coverUrl">
      </div>
      <div class="form-group form-row">
        <label for="read">Read:</label>
        <input type="checkbox" id="read" name="read">
      </div>
      <button type="button" id="submitButton">Add Book</button>
    </form>
    <div id="library">
      <!-- Library content will be dynamically generated here -->
    </div>
  </main>
</body>
</html>
